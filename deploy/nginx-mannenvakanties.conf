# nginx reverse proxy voor Mannenvakanties
# Plaats als:  /etc/nginx/sites-available/mannenvakanties
# Activeer met: sudo ln -s /etc/nginx/sites-available/mannenvakanties /etc/nginx/sites-enabled/
#               sudo nginx -t && sudo systemctl reload nginx
# Daarna https aanzetten met: sudo certbot --nginx -d album.jouwdomein.de

server {
    listen 80;
    listen [::]:80;
    server_name album.jouwdomein.de;   # << vervang door jouw (sub)domein

    # Ruimte voor foto-uploads (anders blokkeert nginx grote uploads).
    # Verhoog gerust als je veel foto's tegelijk wilt uploaden.
    client_max_body_size 200M;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300;
    }
}
